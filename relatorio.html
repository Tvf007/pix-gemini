<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BuyPix - Relatório Real</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; touch-action: manipulation; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; }
        h1 { color: #00e676; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-item { background: #222; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: bold; color: #00e676; margin-top: 5px; }
        .back { display: block; margin-top: 20px; color: #888; text-decoration: none; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Resumo de Vendas</h1>
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">Total Bruto</div>
                <div class="stat-value" id="total-amount">R$ 0,00</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total Líquido</div>
                <div class="stat-value" id="total-net">R$ 0,00</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Saldo em Conta</div>
                <div class="stat-value" id="balance">R$ 0,00</div>
            </div>
        </div>
        <a href="index.html" class="back">← Voltar para Máquina</a>
    </div>

    <script>
        async function loadReport() {
            try {
                const response = await fetch('/api/report');
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    document.getElementById('total-amount').innerText = `R$ ${data.total_amount.toFixed(2)}`;
                    document.getElementById('total-net').innerText = `R$ ${data.total_net.toFixed(2)}`;
                    document.getElementById('balance').innerText = `R$ ${data.balance.toFixed(2)}`;
                }
            } catch (e) {
                console.error("Erro ao carregar relatório:", e);
            }
        }
        loadReport();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BuyPix - Relatório Local</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; touch-action: manipulation; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; }
        h1 { color: #00e676; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin: 20px 0; }
        .stat-item { background: #222; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 32px; font-weight: bold; color: #00e676; margin-top: 10px; }
        .back { display: block; margin-top: 30px; color: #888; text-decoration: none; text-align: center; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        th { color: #888; font-weight: normal; text-transform: uppercase; font-size: 12px; }
        .status-tag { background: #1b5e20; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Vendas de Hoje</h1>
        
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">Total Local (Bruto)</div>
                <div class="stat-value" id="local-total">R$ 0,00</div>
            </div>
        </div>

        <h3>Vendas Recentes</h3>
        <table id="local-sales-table">
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Valor</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button onclick="clearLocalData()" style="width: 100%; margin-top: 30px; background: #333; color: #aaa; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer;">Limpar Histórico Local</button>
        <a href="index.html" class="back">← Voltar para a Máquina</a>
    </div>

    <script>
        function loadReport() {
            const localSales = JSON.parse(localStorage.getItem('pending_sales') || '[]');
            const tbody = document.querySelector('#local-sales-table tbody');
            let localTotal = 0;

            tbody.innerHTML = ''; // Limpa antes de carregar
            
            localSales.reverse().forEach(sale => {
                const row = `<tr>
                    <td>${new Date(sale.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                    <td>R$ ${sale.amount.toFixed(2)}</td>
                    <td><span class="status-tag">CONFIRMADO</span></td>
                </tr>`;
                tbody.innerHTML += row;
                localTotal += sale.amount;
            });
            
            document.getElementById('local-total').innerText = `R$ ${localTotal.toFixed(2).replace('.', ',')}`;
        }

        function clearLocalData() {
            if(confirm("Deseja apagar o histórico de vendas local?")) {
                localStorage.removeItem('pending_sales');
                loadReport();
            }
        }
        
        loadReport();
    </script>
</body>
</html>
